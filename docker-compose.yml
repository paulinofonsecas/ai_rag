services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hybrid-postgres
    environment:
      POSTGRES_DB: hybrid_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/001_init_hybrid_search.sql:/docker-entrypoint-initdb.d/001_init_hybrid_search.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hybrid_search']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: hybrid-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: hybrid-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hybrid_search
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-local-dev-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      - ./nest-cli.json:/app/nest-cli.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['npm', 'run', 'start:dev']

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: hybrid-worker
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hybrid_search
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-local-dev-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      - ./nest-cli.json:/app/nest-cli.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['npm', 'run', 'start:worker:dev']

volumes:
  postgres_data:
