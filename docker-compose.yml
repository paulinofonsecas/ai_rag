services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hybrid-postgres
    environment:
      POSTGRES_DB: hybrid_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/001_init_hybrid_search.sql:/docker-entrypoint-initdb.d/001_init_hybrid_search.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hybrid_search']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: hybrid-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-api
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hybrid_search
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-local-dev-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['node', 'dist/main.js']

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hybrid_search
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-local-dev-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['node', 'dist/workers/main.worker.js']

volumes:
  postgres_data:
